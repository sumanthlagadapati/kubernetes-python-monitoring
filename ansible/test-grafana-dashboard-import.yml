---
- name: Test Grafana Dashboard Import
  hosts: localhost
  connection: local
  tasks:
    - name: Create Grafana Dashboard ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: grafana-dashboard
            namespace: monitoring
            labels:
              grafana_dashboard: "1"
          data:
            python-app-monitoring.json: |
              {{ lookup('file', '../monitoring/grafana-dashboard.json') | indent(14) }}

    - name: Patch Grafana Deployment to Mount Dashboard ConfigMap
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        namespace: monitoring
        name: grafana
        merge_type:
          - strategic-merge
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: grafana
                    volumeMounts:
                      - name: dashboards
                        mountPath: /var/lib/grafana/dashboards
                volumes:
                  - name: dashboards
                    configMap:
                      name: grafana-dashboard

    - name: Configure Grafana to Auto-import Dashboards
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        namespace: monitoring
        name: grafana
        merge_type:
          - strategic-merge
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: grafana
                    env:
                      - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
                        value: /var/lib/grafana/dashboards/python-app-monitoring.json
                    envFrom: []
